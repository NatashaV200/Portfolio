<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ============================================================
         PRIMARY META
         ============================================================ -->
    <title>Faith Natasha - Full-Stack Developer Portfolio</title>
    <meta
      name="description"
      content="Faith Natasha is a full-stack developer building scalable web apps for 100K+ users. Specialising in React, TypeScript, Node.js, PostgreSQL, and cloud deployment. Available for remote work." />
    <meta name="author" content="Faith Natasha" />
    <meta
      name="keywords"
      content="Faith Natasha, full-stack developer, React developer, TypeScript, Node.js, PostgreSQL, web developer, software engineer, portfolio, remote developer" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL — update to your deployed domain -->
    <link rel="canonical" href="https://faithnatasha.dev/" />

    <!-- Mobile browser chrome colour (light / dark) -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#0b0f1a" />

    <!-- ============================================================
         OPEN GRAPH  (Facebook, LinkedIn, WhatsApp, Slack …)
         ============================================================ -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Faith Natasha Portfolio" />
    <meta property="og:locale"      content="en_US" />
    <!-- Update URL to your deployed domain -->
    <meta property="og:url"         content="https://faithnatasha.dev/" />
    <meta property="og:title"       content="Faith Natasha - Full-Stack Developer Portfolio" />
    <meta
      property="og:description"
      content="5+ years building performant, accessible web applications for 100K+ users. React · TypeScript · Node.js · PostgreSQL. Available for remote opportunities." />
    <!--
      og:image — replace with a real 1200×630 px screenshot of your portfolio.
      Tools: og-image-gen, Playwright screenshot, or a Figma export.
    -->
    <meta property="og:image"        content="https://faithnatasha.dev/og-preview.png" />
    <meta property="og:image:secure_url" content="https://faithnatasha.dev/og-preview.png" />
    <meta property="og:image:type"   content="image/png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="Faith Natasha portfolio — full-stack developer" />

    <!-- ============================================================
         TWITTER / X CARD
         ============================================================ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <!-- Update to your actual Twitter/X handle -->
    <meta name="twitter:site"        content="@faithnatasha" />
    <meta name="twitter:creator"     content="@faithnatasha" />
    <meta name="twitter:title"       content="Faith Natasha - Full-Stack Developer Portfolio" />
    <meta
      name="twitter:description"
      content="5+ years building performant, accessible web apps for 100K+ users. React · TypeScript · Node.js. Available for remote work." />
    <meta name="twitter:image"       content="https://faithnatasha.dev/og-preview.png" />
    <meta name="twitter:image:alt"   content="Faith Natasha portfolio — full-stack developer" />

    <!-- ============================================================
         FAVICON / ICONS
         ============================================================ -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Add /apple-touch-icon.png (180×180) to /public for iOS home screen -->

    <!-- ============================================================
         FONTS  (preconnect first to eliminate render-blocking)
         Using variable fonts for better performance (single file vs 4 separate weights)
         ============================================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Inter: primary sans-serif (wght 100-900) — single variable font file -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet" />
    <!-- JetBrains Mono: monospace for code/tech tags (wght 400,700) — adds personality, improves code readability -->
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet" />

    <!-- ============================================================
         STRUCTURED DATA — JSON-LD Person schema
         Enables Google rich results (knowledge panel, sitelinks, etc.)
         ============================================================ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Faith Natasha",
      "url": "https://faithnatasha.dev/",
      "image": "https://faithnatasha.dev/og-preview.png",
      "jobTitle": "Full-Stack Developer",
      "description": "Full-stack developer with 5+ years of experience building scalable web applications, specialising in React, TypeScript, Node.js, and PostgreSQL.",
      "knowsAbout": ["React", "TypeScript", "Node.js", "PostgreSQL", "MongoDB", "Docker", "AWS", "GraphQL"],
      "sameAs": [
        "https://github.com/faith200",
        "https://linkedin.com/in/faithnatasha",
        "https://x.com/faithnatasha"
      ],
      "worksFor": {
        "@type": "Organization",
        "name": "Freelance / Remote"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
